{% extends "base.html" %}
{% block content_footer %}
  {{ super() }}
  <hr />
  <h2 id="__comments">💡 Community & Feedback</h2>
  <script src="https://giscus.app/client.js"
        data-repo="rombey86/mkdocs"
        data-repo-id="R_kgDOROLfMA"
        data-category="Announcements"
        data-category-id="DIC_kwDOROLfMM4C2-Og"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="preferred_color_scheme"
        data-lang="de"
        crossorigin="anonymous"
        async>
</script>
{% endblock %}
{% block footer %}
  <hr>
  <div class="md-footer-meta md-typeset">
    <div class="md-footer-meta__inner md-grid">
      <div style="text-align: center; width: 100%;">
        
        <div style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 0.5em;">
          Netzwerk & Partner
        </div>

        <nav class="partner-nav">
          {% for partner in config.extra.partners %}
            <a href="{{ partner.href }}" title="{{ partner.title }}" target="_blank" rel="noopener">
              {{ partner.name }}
            </a>
          {% endfor %}
        </nav>

      </div>
    </div>
  </div>

  {{ super() }}
{% endblock %}
