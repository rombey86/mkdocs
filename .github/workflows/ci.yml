name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main  # oder 'master', je nachdem wie dein Hauptbranch heißt

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          # Falls requirements leer war, sicherheitshalber:
          pip install mkdocs-material

      - name: Build Site
        run: mkdocs build
        # Das erstellt den Ordner "site/"

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Der entscheidende Befehl: Lade den Ordner 'site' hoch
          command: pages deploy site --project-name=it-virtuoso-mkdoc --commit-dirty=true
