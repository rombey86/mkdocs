site_name: IT-Virtuoso Knowledge Base
site_url: https://it-virtuoso.de
repo_url: https://github.com/rombey86/mkdocs
edit_uri: edit/main/docs/

theme:
  name: 'material'
  language: de
  custom_dir: overrides
  icon:
    logo: material/console
  palette: 
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Zum hellen Modus wechseln
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Zum dunklen Modus wechseln
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list # Wichtig für Bilder-Größen oder CSS-Klassen direkt im MD
  - md_in_html # Erlaubt Markdown innerhalb von HTML-Tags (wichtig für overrides)
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true 
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true
# - cards:      # Deaktiviert, bis Dependencies (Pillow/Cairo) installiert sind
#     dev: false

