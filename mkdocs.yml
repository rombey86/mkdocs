site_name: IT-Virtuoso Knowledge Base
site_url: https://it-virtuoso.de
repo_url: https://github.com/rombey86/mkdocs
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  custom_dir: overrides  # ZWINGEND NOTWENDIG für die Partner-Links im Footer
  icon:
    logo: material/console
  palette: 
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Zum hellen Modus wechseln
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Zum dunklen Modus wechseln
  features:
    - navigation.tracking
    - navigation.expand
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true
# - cards:      # Deaktiviert, bis Dependencies (Pillow/Cairo) installiert sind
#     dev: false

nav:
  - Home: index.md
  - Linux & Server: 
      - Übersicht: linux/index.md
      - SSH Hardening: linux/ssh-hardening.md
      - ACME DNS Challenge: linux/acme-dns.md
  - Container & Cloud:
      - Übersicht: container/index.md
  - Smart Home:
      - Übersicht: smarthome/index.md
  - Über mich: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rombey86
  status:
    new: Neu
  partners:
    - name: "CAMDATA - Machen Sie mehr aus ihrer IT"
      href: "https://camdata.de"
      title: "CAMDATA - Machen Sie mehr aus ihrer IT"
    - name: "Ingenieurbüro HSE NRW – Sicherheit, Gesundheit & Umwelt"
      href: "https://www.hse-nrw.de"
      title: "Ingenieurbüro HSE NRW – Sicherheit, Gesundheit & Umwelt"
    - name: "ZASS IT.Solutions"
      href: "https://zass.solutions"
      title: "ZASS IT.Solutions"
    - name: "Pulverbeschichtung NRW van de Wetering"
      href: "https://www.pulverbeschichtung-nrw.com"
      title: "Pulverbeschichtung NRW"

extra_css:
  - stylesheets/extra.css  # Lädt das Styling für die Partner-Links

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
