site_name: IT-Virtuoso Knowledge Base
site_url: https://it-virtuoso.de
repo_url: https://github.com/rombey86/it-virtuoso

theme:
  name: material
  language: de
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.expand
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - 'Home': 'index.md'
  - 'Linux & Server': 'linux/ssh-hardening.md' # Placeholder
  - 'Container & Cloud': 'container/index.md'  # Placeholder
  - 'Smart Home': 'smarthome/index.md'      # Placeholder
  - 'Über mich': 'about.md'                # Placeholder
